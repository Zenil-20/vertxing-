# Vertxing — build the Android APK in the cloud, so no Android Studio is needed.
# After it runs: open the workflow run → Artifacts → download "vertxing-debug-apk"
# → transfer to your phone → install (allow "install unknown apps" once).
name: Build Android APK

on:
  workflow_dispatch: # lets you trigger a build manually from the Actions tab
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Sync Capacitor (copy web assets + plugins into the native project)
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vertxing-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
